algorithm_description: Process Boreal HLS NDVI Temporal Trend
algorithm_name: boreal_ndvi_trend
algorithm_version: v0.1
build_command: boreal_ndvi_trend/build_env.sh
disk_space: 8GB
docker_container_url: mas.maap-project.org/root/maap-workspaces/custom_images/maap_base:v5.0.0
inputs:
  config: []
  positional:
  - default: ''
    description: 'tile'
    name: tile
    required: true
  - default: ''
    description: 'Start year'
    name: ys
    required: true
  - default: ''
    description: 'End year'
    name: ye
    required: true
  - default: ''
    description: 'Start date in MM-DD format (e.g. 06-01)'
    name: ds
    required: true
  - default: ''
    description: 'End date in MM-DD format (e.g. 09-30)' 
    name: de
    required: true
  - default: ''
    description: 'output directory' 
    name: output
    required: true
queue: maap-dps-worker-16gb
repository_url: https://github.com/terraPulse/boreal_ndvi_trend.git
run_command: boreal_ndvi_trend/run.sh
